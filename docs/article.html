<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opening in AIDicted…</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00e5ff;
            --purple: #b540f5;
            --bg: #080810;
            --card: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow: hidden;
        }

        /* Ambient orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--cyan), transparent 70%);
            top: -20%;
            left: -10%;
            opacity: .15;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--purple), transparent 70%);
            bottom: -10%;
            right: -10%;
            opacity: .12;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 48px 36px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 1;
            backdrop-filter: blur(20px);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5);
            animation: fadeUp 0.5s ease forwards;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: -0.05em;
            margin-bottom: 8px;
        }

        .logo-accent {
            color: var(--cyan);
        }

        .spinner-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 28px 0;
        }

        .spinner-ring {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--cyan);
            animation: spin 0.9s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .status {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 8px;
            min-height: 1.5em;
        }

        .sub {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 32px;
            min-height: 2.5em;
            line-height: 1.5;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 14px 24px;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            border: none;
            text-decoration: none;
            transition: all 0.2s ease;
            margin-bottom: 12px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            color: #000;
            box-shadow: 0 4px 20px rgba(0, 229, 255, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 229, 255, 0.45);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--border);
            color: #fff;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.8rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .footer-note {
            font-size: 0.78rem;
            color: rgba(255, 255, 255, 0.25);
            margin-top: 8px;
        }

        /* Success state */
        .icon-success {
            font-size: 3rem;
            display: block;
            margin-bottom: 12px;
            animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes pop {
            from {
                transform: scale(0);
            }

            to {
                transform: scale(1);
            }
        }
    </style>
</head>

<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="card" id="card">
        <div class="logo">AI<span class="logo-accent">Dicted</span></div>

        <div id="loadingView">
            <div class="spinner-wrap">
                <div class="spinner-ring"></div>
            </div>
            <p class="status" id="statusText">Opening in the app…</p>
            <p class="sub" id="subText">If the app doesn't open automatically, use the button below.</p>
        </div>

        <div id="openView" style="display:none; margin-top:24px;">
            <a class="btn btn-primary" id="openAppBtn" href="#">
                📱 Open in AIDicted App
            </a>
            <div class="divider">or</div>
            <a class="btn btn-secondary" href="https://play.google.com/store/apps/details?id=com.ai.aidicted"
                target="_blank">
                ⬇️ Download on Play Store
            </a>
            <a class="btn btn-secondary" href="/" style="margin-top:4px;">
                🌐 Continue on Website
            </a>
            <p class="footer-note">AIDicted — AI News, Curated Daily</p>
        </div>
    </div>

    <script>
        // Extract articleId from URL: /article/{id}
        const pathParts = window.location.pathname.split('/').filter(Boolean);
        const articleId = pathParts[1] || '';

        // Deep link URLs
        const customSchemeUrl = `aidicted://article/${encodeURIComponent(articleId)}`;
        const httpsUrl = `https://aidicted.in/article/${encodeURIComponent(articleId)}`;

        // Set the Open App button href
        document.getElementById('openAppBtn').href = customSchemeUrl;

        let appOpened = false;

        // Try to open the app automatically via custom scheme
        function tryOpenApp() {
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.src = customSchemeUrl;
            document.body.appendChild(iframe);

            // If page loses focus, app opened successfully
            window.addEventListener('blur', () => { appOpened = true; }, { once: true });

            // After 2s, if we're still here, show manual buttons
            setTimeout(() => {
                if (!appOpened) {
                    showOpenView();
                }
            }, 2000);
        }

        function showOpenView() {
            document.getElementById('loadingView').style.display = 'none';
            document.getElementById('openView').style.display = 'block';
        }

        // Check if on Android — auto-attempt only on Android
        const isAndroid = /android/i.test(navigator.userAgent);
        const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);

        if (isAndroid) {
            document.getElementById('statusText').textContent = 'Opening in AIDicted…';
            document.getElementById('subText').textContent = 'Redirecting to the app. This should only take a moment.';
            tryOpenApp();
        } else if (isIOS) {
            // iOS — no Android app, just show website link
            document.getElementById('statusText').textContent = 'AIDicted is for Android';
            document.getElementById('subText').textContent = 'The app is currently available on Android only.';
            showOpenView();
        } else {
            // Desktop — just show manual buttons immediately
            document.getElementById('statusText').textContent = 'Open this on Android';
            document.getElementById('subText').textContent = 'Scan or open this link on your Android device to launch the AIDicted app.';
            showOpenView();
        }
    </script>
</body>

</html>
