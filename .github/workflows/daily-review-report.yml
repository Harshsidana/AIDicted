name: Daily Play Store Review Report

on:
  # Run every day at 8:00 AM IST (02:30 UTC)
  schedule:
    - cron: '30 2 * * *'
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: read

jobs:
  review-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build review agent jar
        working-directory: playstore-review-agent
        run: ./gradlew jar

      - name: Write service account JSON key
        # Writes the secret JSON content to a temp file the agent can read
        run: |
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > /tmp/service-account.json

      - name: Run Review Agent
        working-directory: playstore-review-agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: /tmp/service-account.json
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          APP_PACKAGE_NAME: com.ai.aidicted
        run: java -jar build/libs/playstore-review-agent-1.0.0.jar

      - name: Cleanup secrets
        if: always()
        run: rm -f /tmp/service-account.json
