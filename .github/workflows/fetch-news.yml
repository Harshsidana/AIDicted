name: Fetch AI News

on:
  # Run every 30 minutes
  schedule:
    - cron: '*/30 * * * *'
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

# Grant the GITHUB_TOKEN permission to push commits and deploy
permissions:
  contents: write
  id-token: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Use token with write access so git push works
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install rss-parser

      - name: Fetch RSS feeds
        run: node .github/scripts/fetch-news.js

      - name: Check if articles.json changed
        id: diff
        run: |
          git diff --quiet docs/data/articles.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated articles
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/articles.json
          git commit -m "chore: update articles.json [skip ci]"
          git pull --rebase origin main
          git push origin main

      - name: Deploy to Firebase Hosting
        if: steps.diff.outputs.changed == 'true' && secrets.FIREBASE_SERVICE_ACCOUNT != ''
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: aidicted-app
          channelId: live
